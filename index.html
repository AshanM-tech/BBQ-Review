<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live BBQ Arena Board</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght=600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --bg-dark: #0f111a;
            --arena-orange: #ff5722;
            --neon-glow: rgba(255, 87, 34, 0.4);
            --text-muted: #64748b;
            
            /* High Contrast Modern Card Colors */
            --card-team-bg: #1e2230;
            --card-event-bg: #251c22;
            --text-light: #f8fafc;
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            /* Grid line aesthetics with vibrant ambient background spots */
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(255, 87, 34, 0.25) 0%, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: auto, 40px 40px, 40px 40px;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 35px 0 20px 0;
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(15, 17, 26, 0.8);
            backdrop-filter: blur(8px);
        }

        .logo-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .logo-img {
            height: 105px;
            width: auto;
            object-fit: contain;
            display: block;
            filter: drop-shadow(0 0 30px rgba(255, 87, 34, 0.5));
        }

        .logo-fallback {
            font-size: 2.5rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #ffffff;
            letter-spacing: 3px;
            text-shadow: 0 0 30px var(--arena-orange);
        }

        .subtitle {
            color: #ff9800;
            font-size: 0.8rem;
            letter-spacing: 7px;
            text-transform: uppercase;
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(255, 152, 0, 0.3);
        }

        #board-viewport {
            flex: 1;
            width: 100%;
            overflow-y: auto;
            z-index: 1;
        }
        
        #dashboard-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            padding: 30px 40px 60px 40px;
        }

        /* High-End Cyber-Cyberpunk Sticky Alternative Layout */
        .thumb {
            position: relative;
            background: var(--card-team-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 24px;
            color: var(--text-light);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Neon side indicator tag instead of top tape */
        .thumb::before {
            content: '';
            position: absolute;
            top: 24px;
            left: 0;
            width: 4px;
            height: 35px;
            background: #00e5ff;
            border-radius: 0 4px 4px 0;
            box-shadow: 0 0 10px #00e5ff;
        }

        .thumb.sticky-event {
            background: var(--card-event-bg);
        }
        
        .thumb.sticky-event::before {
            background: #ff0055;
            box-shadow: 0 0 10px #ff0055;
        }

        .thumb:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7), 0 0 20px rgba(255, 255, 255, 0.05);
        }

        /* Active Spotlight item glowing outline */
        .thumb.spotlighting {
            border-color: var(--arena-orange);
            box-shadow: 0 0 30px var(--neon-glow);
            transform: scale(1.03);
        }

        .thumb .label-team {
            font-size: 0.9rem;
            font-weight: 700;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-left: 8px;
        }

        .thumb .stars { 
            color: #ffca28; 
            font-size: 0.9rem;
            text-shadow: 0 0 8px rgba(255, 202, 40, 0.6);
        }
        
        .thumb .card-content {
            font-family: 'Plus Jakarta Sans', sans-serif; /* Cleaner modern font switch */
            font-size: 1.05rem;
            line-height: 1.5;
            font-weight: 500;
            color: #cbd5e1;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .thumb .short-name {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
        }

        .loading {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.1rem;
            color: var(--text-muted);
            padding: 100px 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* ---------- Spotlight Overlay Glassmorphism ---------- */
        #spotlight-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            background-color: rgba(10, 11, 15, 0.9);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        
        #spotlight-overlay.show {
            pointer-events: auto;
            opacity: 1;
        }
        
        #spotlight-card {
            position: relative;
            width: min(600px, 90vw);
            padding: 45px;
            border-radius: 16px;
            background: #1e2230;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            color: var(--text-light);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        #spotlight-overlay.show #spotlight-card {
            transform: scale(1);
        }
        
        #spotlight-card.sticky-event {
            background: #251c22;
        }

        #spotlight-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 45px;
            width: 60px;
            height: 4px;
            background: #00e5ff;
            box-shadow: 0 0 15px #00e5ff;
        }
        
        #spotlight-card.sticky-event::before {
            background: #ff0055;
            box-shadow: 0 0 15px #ff0055;
        }
        
        #spotlight-card .label-team {
            font-size: 1.3rem;
            font-weight: 800;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }
        
        #spotlight-card .stars {
            color: #ffca28;
            font-size: 1.4rem;
            text-shadow: 0 0 10px rgba(255, 202, 40, 0.5);
        }
        
        #spotlight-card .card-content {
            font-size: 1.8rem;
            line-height: 1.4;
            font-weight: 600;
            color: #f1f5f9;
        }
        
        #spotlight-card .card-content.long-text {
            font-size: 1.4rem;
        }
        
        #spotlight-card .short-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <div class="logo-fallback" id="brand-fallback" style="display: none;">Grill Masters</div>
            <img class="logo-img" src="imagebbq.png" alt="Grill Masters Logo" onerror="document.getElementById('brand-fallback').style.display='block'; this.style.display='none';">
        </div>
        <div class="subtitle">Live Pitmaster Updates</div>
    </header>

    <div id="board-viewport">
        <div id="dashboard-container">
            <div class="loading" id="loading-msg">Connecting to live pit stream...</div>
        </div>
    </div>

    <div id="spotlight-overlay">
        <div id="spotlight-card"></div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSUPsZRf8sahc6_gXU_wLd2YXhY2kMZZFGJppOemR1anJui7_jZjzfrjeOGvE1-WyKPgRDX_p4I-mRE/pub?gid=1245279387&single=true&output=csv';
        const refreshInterval = 15000;
        const stateDuration = 5000; 

        let currentDataSignature = '';
        let notesData = [];
        let spotlightIndex = -1;
        let isPopupActive = false; 
        let alternateCycleTimer = null;

        function formatTimestamp(raw) {
            if (!raw) return '';
            const d = new Date(raw);
            if (isNaN(d.getTime())) return raw;
            const pad = n => String(n).padStart(2, '0');
            return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        function parseCSV(text) {
            return text.split('\n')
                .filter(r => r.trim().length > 0)
                .map(row => row.split(/,(?=(?:?:[^"]*"){2})*[^"]*$)/)
                    .map(cell => cell.replace(/^"|"$/g, '').trim().replace(/""/g, '"')));
        }

        function escapeHTML(str) {
            return String(str).replace(/[&<>'"]/g,
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        async function fetchDashboardData() {
            try {
                const separator = csvUrl.includes('?') ? '&' : '?';
                const response = await fetch(csvUrl + separator + 't=' + new Date().getTime());
                if (!response.ok) throw new Error('Network failure');
                const data = await response.text();

                if (data === currentDataSignature) return;
                currentDataSignature = data;

                const rows = parseCSV(data);
                if (rows.length < 1) return;

                const header = rows[0].map(h => h.toLowerCase().trim());
                const idx = {
                    timestamp: header.indexOf('timestamp'),
                    shortName: header.indexOf('short name'),
                    reviewEvent: header.indexOf('review event'),
                    type: header.indexOf('type'),
                    reviewFood: header.indexOf('review food'),
                    teamName: header.indexOf('team name'),
                    review: header.indexOf('review')
                };

                const parsed = [];
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || row.every(cell => !cell)) continue;

                    const responseType = (row[idx.type] || '').toLowerCase().trim();
                    const shortName = row[idx.shortName] || 'Anon';
                    const timeLabel = formatTimestamp(row[idx.timestamp]);
                    let reviewText = '';
                    let teamName = '';
                    let starDisplay = '';

                    if (responseType === 'team') {
                        const starCount = parseInt(row[idx.reviewFood], 10) || 0;
                        starDisplay = '★'.repeat(Math.min(Math.max(starCount, 0), 5)) || 'No Rating';
                        teamName = row[idx.teamName] || 'Team';
                        reviewText = row[idx.review] || '';
                        if (!reviewText && !teamName) continue;
                    } else if (responseType === 'event') {
                        reviewText = row[idx.reviewEvent] || '';
                        if (!reviewText) continue;
                    } else {
                        continue;
                    }

                    parsed.push({
                        type: responseType,
                        shortName, timeLabel, reviewText, teamName, starDisplay,
                        footerLabel: timeLabel ? `<span>By ${shortName}</span> <span>⏱️ ${timeLabel}</span>` : `By ${shortName}`
                    });
                }

                notesData = parsed;
                renderThumbnailWall();

                if (alternateCycleTimer === null && notesData.length > 0) {
                    runStateCycle();
                }
            } catch (error) {
                console.error('Error syncing dynamic matrix:', error);
            }
        }

        function renderThumbnailWall() {
            const container = document.getElementById('dashboard-container');
            container.innerHTML = '';

            if (notesData.length === 0) {
                container.innerHTML = `<div class="loading" id="loading-msg">Waiting for submissions... Bring on the smoke!</div>`;
                return;
            }

            notesData.forEach((note, i) => {
                const thumbEl = document.createElement('div');
                thumbEl.className = 'thumb ' + (note.type === 'team' ? 'sticky-team' : 'sticky-event');
                thumbEl.dataset.noteIndex = i;

                let inner = '';
                if (note.type === 'team') {
                    inner += `<div class="label-team"><span>${escapeHTML(note.teamName)}</span> <span class="stars">${note.starDisplay}</span></div>`;
                }
                inner += `<div class="card-content">${escapeHTML(note.reviewText)}</div>`;
                inner += `<div class="short-name">${note.footerLabel}</div>`;
                thumbEl.innerHTML = inner;

                container.appendChild(thumbEl);
            });
        }

        function runStateCycle() {
            if (notesData.length === 0) {
                alternateCycleTimer = setTimeout(runStateCycle, stateDuration);
                return;
            }

            const overlay = document.getElementById('spotlight-overlay');

            if (!isPopupActive) {
                isPopupActive = true;
                
                spotlightIndex = (spotlightIndex + 1) % notesData.length;
                const note = notesData[spotlightIndex];

                const card = document.getElementById('spotlight-card');
                card.className = note.type === 'team' ? 'sticky-team' : 'sticky-event';

                let inner = '';
                if (note.type === 'team') {
                    inner += `<div class="label-team"><span>${escapeHTML(note.teamName)}</span> <span class="stars">${note.starDisplay}</span></div>`;
                }
                inner += `<div class="card-content${note.reviewText.length > 140 ? ' long-text' : ''}">${escapeHTML(note.reviewText)}</div>`;
                inner += `<div class="short-name">${note.footerLabel}</div>`;
                card.innerHTML = inner;

                overlay.classList.add('show');

                document.querySelectorAll('.thumb.spotlighting').forEach(el => el.classList.remove('spotlighting'));
                const matchingThumb = document.querySelector(`.thumb[data-note-index="${spotlightIndex}"]`);
                if (matchingThumb) matchingThumb.classList.add('spotlighting');

            } else {
                isPopupActive = false;
                overlay.classList.remove('show');
                document.querySelectorAll('.thumb.spotlighting').forEach(el => el.classList.remove('spotlighting'));
            }

            alternateCycleTimer = setTimeout(runStateCycle, stateDuration);
        }

        fetchDashboardData();
        setInterval(fetchDashboardData, refreshInterval);
    </script>
</body>
</html>
